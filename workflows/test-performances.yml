name: TEST - Mise à jour performances (sans risque)

on:
  workflow_dispatch:   # seulement lancement manuel

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Créer dossier de test
        run: mkdir -p data_test

      - name: Lancer le script en mode test
        run: python scripts/update_performances.py

      - name: Upload des CSV générés (pour vérif)
        uses: actions/upload-artifact@v4
        with:
          name: csv-de-test
          path: data_test/TEST_*.csv
