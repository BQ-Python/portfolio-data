<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Labs - Articles & Rapports</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>

  <nav>
    <div class="nav">
      <div class="logo">Horizon<span>Labs</span></div>
      <div class="links">
        <a href="index.html">Accueil</a>
        <a href="portefeuilles.html">Portefeuilles</a>
        <a href="newsletter.html" class="active">Articles</a>
        <a href="abonnements.html">Abonnements</a>

        <a href="auth.html" id="login-btn" class="auth-button">S'authentifier</a>

        <div id="user-menu">
          <img id="user-photo" src="" alt="Photo">
          <span id="user-name"></span>
          <button id="logout-btn">Déconnexion</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1>Nos Articles & Rapports</h1>
    <p class="subtitle">Analyses exclusives, rapports stratégiques et convictions mensuelles.</p>
    <div class="grid" id="grid"></div>
  </div>

  <!-- SDK Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <!-- Ton script -->
  <script src="auth.js"></script>

  <script>
    const BASE_URL = "https://raw.githubusercontent.com/BQ-Python/portfolio-data/main/";
    const JSON_URL = BASE_URL + "newsletter.json";

    async function loadArticles() {
      try {
        const res = await fetch(JSON_URL + "?t=" + Date.now());
        if (!res.ok) throw new Error("JSON introuvable");
        const data = await res.json();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        data.sort((a, b) => new Date(b.date) - new Date(a.date));
        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-header"><h3>${item.title}</h3><div class="author">par ${item.author}</div></div>
            <div class="meta">
              <span>${new Date(item.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
              <span class="read-time">${item.readTime} de lecture</span>
            </div>
            <div class="excerpt">${item.excerpt}</div>
            <a href="${item.file}" target="_blank" class="download-btn">Télécharger le PDF</a>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('grid').innerHTML = '<p>Erreur de chargement.</p>';
      }
    }
    loadArticles();
  </script>
</body>
</html>
